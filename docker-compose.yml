services:
  db:
    image: postgres:16
    container_name: planka_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: planka
    ports:
      - "5432:5432"
    volumes:
      - planka_data:/var/lib/postgresql/data

volumes:
  planka_data: